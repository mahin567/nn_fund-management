[options]

; ── Database ──────────────────────────────────────────────────────────────────
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
; db_name = odoo

; ── Addons ────────────────────────────────────────────────────────────────────
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; ── Server ────────────────────────────────────────────────────────────────────
http_interface = 0.0.0.0
http_port = 8069
longpolling_port = 8072

; ── Logging ───────────────────────────────────────────────────────────────────
log_level = info
logfile = /var/log/odoo/odoo.log

; ── Performance ───────────────────────────────────────────────────────────────
workers = 2
max_cron_threads = 1

; ── Security ──────────────────────────────────────────────────────────────────
; Set a strong master password before deploying to any non-local environment.
; Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
admin_passwd = CHANGE_ME_BEFORE_DEPLOYING

; ── Email (optional — configure for notification features) ────────────────────
; smtp_server = smtp.example.com
; smtp_port = 587
; smtp_ssl = starttls
; smtp_user = your@email.com
; smtp_password = yourpassword
; email_from = your@email.com